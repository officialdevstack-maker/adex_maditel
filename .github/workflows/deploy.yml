name: Deploy Site to live

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, curl, pdo, mysql
          coverage: none

      # - name: Copy .env
      #   run: cp .env.example .env

      - name: Install PHP dependencies
        run: |
          php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
          php composer-setup.php --install-dir=/usr/local/bin --filename=composer
          composer install --optimize-autoloader

      - name: Prepare Laravel storage and cache
        run: |
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache
          mkdir -p storage/logs
          mkdir -p bootstrap/cache
          chmod -R 775 storage bootstrap/cache

      - name: Deploy Backend
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # IMPORTANT: FTP_SERVER must be the DIRECT cPanel host, e.g.
          # server345.web-hosting.com (or the account's shared IP from cPanel
          # → Server Information). Do NOT use app.maditelecoms.com — that
          # domain is proxied through Cloudflare, which does not carry FTP
          # (port 21), so the connection just times out on a Cloudflare IP
          # (172.67.x.x / 104.21.x.x). See the ETIMEDOUT :21 deploy failure.
          server: "server345.web-hosting.com"
          username: "maditel@maditelecoms.com"
          password: "BbEj7+rJBZ!?;V{f"
          port: 21
          server-dir: /public_html/
          local-dir: ./ # deploy everything
          exclude: |
            **/node_modules/**
            **/.git*
            # Never ship a CI-built .env over the server's real one.
            **/.env
